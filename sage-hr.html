<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>REDMAN HR</title>

  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #D32F2F;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #D32F2F;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #b71c1c;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>REDMAN HR</h1>
    <p>Acceso a Sage HR</p>

    <button onclick="openHR()">Abrir Sage HR</button>
  </div>
<script>
  microsoftTeams.app.initialize();

  function openHR() {
    microsoftTeams.app.openLink("https://redman.sage.hr");
  }
</script>

</body>
</html>
